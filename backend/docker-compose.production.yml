services:
  # Redis
  redis:
    image: redis:7-alpine
    container_name: mecabal-redis
    restart: always
    command: >
      sh -c "if [ -n \"${REDIS_PASSWORD}\" ]; then
        redis-server --appendonly yes --requirepass \"${REDIS_PASSWORD}\" --maxmemory 256mb --maxmemory-policy allkeys-lru;
      else
        redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru;
      fi"
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - mecabal-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # MinIO (S3-compatible object storage)
  minio:
    image: minio/minio:latest
    container_name: mecabal-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - mecabal-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # Backend Monolith (single NestJS application)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: mecabal-backend:latest
    container_name: mecabal-backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - DATABASE_HOST=host.docker.internal
      - REDIS_HOST=host.docker.internal
      - DATABASE_SYNCHRONIZE=${DATABASE_SYNCHRONIZE:-false}
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mecabal-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # Nginx (Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: mecabal-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl/certs:ro
      - ./ssl:/etc/letsencrypt:ro
      - ./ssl:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - mecabal-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

volumes:
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  mecabal-network:
    external: true
    name: mecabal_network
