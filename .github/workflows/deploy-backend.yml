name: Deploy MeCabal Backend

on:
  push:
    branches: [ main, develop ]
    paths: [ 'backend/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'backend/**' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

permissions:
  contents: read
  packages: write
  id-token: write

env:
  NODE_VERSION: '22'
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mecabal-backend

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      run: npm ci

    # - name: Run linting
    #   run: npm run lint

    - name: Run tests
      run: npm run test
      env:
        NODE_ENV: test
      continue-on-error: true

    - name: Run e2e tests
      run: npm run test:e2e
      env:
        NODE_ENV: test
      continue-on-error: true

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      run: |
        echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        echo "timestamp=$(date +%s)" >> $GITHUB_OUTPUT

    - name: Build and push backend image
      run: |
        # Force lowercase for Docker registry (required by Docker)
        REGISTRY_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        REGISTRY=ghcr.io/${REGISTRY_OWNER}/mecabal-backend
        SHA_TAG=${{ steps.meta.outputs.sha_short }}

        echo "Building and pushing monolith backend image..."
        docker build \
          --no-cache \
          --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
          --build-arg VCS_REF=${{ github.sha }} \
          -t $REGISTRY:latest \
          -t $REGISTRY:$SHA_TAG \
          -f Dockerfile .

        echo "Image built successfully"

        # Push images
        docker push $REGISTRY:latest
        docker push $REGISTRY:$SHA_TAG

        echo "Image pushed: $REGISTRY:latest"
        echo "Image tagged: $SHA_TAG"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to staging server
      uses: appleboy/ssh-action@v1.0.3
      env:
        GH_PAT: ${{ secrets.GH_PAT }}
        GH_ACTOR: ${{ github.actor }}
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USERNAME }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        port: ${{ secrets.STAGING_PORT || 22 }}
        envs: GH_PAT,GH_ACTOR
        script: |
          # Navigate to project directory
          cd ${{ secrets.STAGING_PROJECT_PATH }}

          # Set Docker Compose timeout for slow/resource-constrained servers
          export COMPOSE_HTTP_TIMEOUT=300

          # Create backup tag for rollback
          if [ -f .env ]; then
            export $(cat .env | grep -E "^DATABASE_[A-Z_]+=" | xargs)
          fi
          pg_dump -h localhost -U ${DATABASE_USERNAME:-mecabal} ${DATABASE_NAME:-mecabal_staging} > backup_staging_$(date +%Y%m%d_%H%M%S).sql 2>/dev/null || echo "Backup skipped (first deployment)"

          # Pull latest code
          git pull origin develop

          # Update environment variables from secrets (only if secret is set)
          if [ -n "${{ secrets.STAGING_ENV }}" ]; then
            if echo "${{ secrets.STAGING_ENV }}" | base64 -d > .env.tmp 2>/dev/null && [ -s .env.tmp ]; then
              mv .env.tmp .env
              echo "Environment variables updated from GitHub secrets"
            else
              rm -f .env.tmp
              echo "ERROR: Failed to decode STAGING_ENV secret"
              echo "Using existing .env file"
              if [ ! -f .env ]; then
                echo "ERROR: .env file does not exist and STAGING_ENV secret decode failed"
                exit 1
              fi
            fi
          else
            echo "STAGING_ENV secret not set - using existing .env file"
            if [ ! -f .env ]; then
              echo "ERROR: .env file does not exist and STAGING_ENV secret is not set"
              exit 1
            fi
          fi

          # Ensure Docker config directory exists
          mkdir -p ~/.docker

          # Login to GitHub Container Registry
          echo "Authenticating with GitHub Container Registry..."
          if timeout 60 bash -c "echo '$GH_PAT' | docker login ghcr.io -u '$GH_ACTOR' --password-stdin"; then
            echo "Successfully authenticated with GitHub Container Registry"
          else
            LOGIN_EXIT_CODE=$?
            if [ $LOGIN_EXIT_CODE -eq 124 ]; then
              echo "Docker login timed out after 60 seconds"
            else
              echo "Failed to authenticate (exit code: $LOGIN_EXIT_CODE)"
            fi

            # Check if credentials are cached
            REGISTRY_OWNER=$(echo "$GH_ACTOR" | tr '[:upper:]' '[:lower:]')
            if docker pull ghcr.io/${REGISTRY_OWNER}/mecabal-backend:latest >/dev/null 2>&1; then
              echo "Login failed but credentials appear cached - continuing..."
            else
              echo "Cannot proceed without valid credentials"
              exit 1
            fi
          fi

          # Pull latest Docker images
          echo "Pulling latest Docker images..."
          if timeout 600 docker-compose -f docker-compose.production.yml pull; then
            echo "Successfully pulled all Docker images"
          else
            PULL_EXIT_CODE=$?
            if [ $PULL_EXIT_CODE -eq 124 ]; then
              echo "Docker pull timed out after 10 minutes"
            else
              echo "Docker pull failed (exit code: $PULL_EXIT_CODE)"
            fi
            echo "Continuing with deployment using cached images..."
          fi

          # Stop existing containers gracefully
          docker-compose -f docker-compose.production.yml down --timeout 30

          # Start new containers
          docker-compose -f docker-compose.production.yml up -d

          # Wait for services to be healthy
          echo "Waiting for backend to start..."
          sleep 30

          # Run database migrations
          echo "Running database migrations..."
          docker exec mecabal-backend npm run migration:run 2>/dev/null || echo "Migration skipped or failed"

          # Health check with retries
          echo "Running health checks..."
          for ATTEMPT in {1..3}; do
            echo "Health check attempt $ATTEMPT/3..."
            if curl -f -s http://localhost:3000/health > /dev/null 2>&1; then
              echo "Backend is healthy!"
              break
            else
              if [ $ATTEMPT -lt 3 ]; then
                echo "Not ready yet, waiting 15 seconds..."
                sleep 15
              else
                echo "WARNING: Backend health check failed after 3 attempts"
                echo "Checking container logs..."
                docker logs mecabal-backend --tail 100 || true
                exit 1
              fi
            fi
          done

          # Clean up old images and containers to save space
          echo "Cleaning up Docker resources..."
          docker container prune -f
          docker image prune -a -f
          docker volume prune -f

          echo "Staging deployment completed successfully!"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to production server
      id: deploy
      uses: appleboy/ssh-action@v1.0.3
      env:
        GH_PAT: ${{ secrets.GH_PAT }}
        GH_ACTOR: ${{ github.actor }}
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USERNAME }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: ${{ secrets.PRODUCTION_PORT || 22 }}
        envs: GH_PAT,GH_ACTOR
        script: |
          # Navigate to project directory
          cd ${{ secrets.PRODUCTION_PROJECT_PATH }}

          # Set Docker Compose timeout for slow/resource-constrained servers
          export COMPOSE_HTTP_TIMEOUT=300

          # Store current commit for potential rollback
          PREVIOUS_COMMIT=$(git rev-parse HEAD)
          echo "Previous commit: $PREVIOUS_COMMIT"

          # Create timestamped backup of current deployment
          BACKUP_FILE="backup_production_$(date +%Y%m%d_%H%M%S).sql"
          echo "Creating database backup: $BACKUP_FILE"

          # Load environment variables for backup
          if [ -f .env.production ]; then
            export $(cat .env.production | grep -E "^DATABASE_[A-Z_]+=" | xargs)
          fi

          # Create backup (skip if database doesn't exist yet)
          pg_dump -h localhost -U ${DATABASE_USERNAME:-mecabal} ${DATABASE_NAME:-mecabal_prod} > $BACKUP_FILE 2>/dev/null || echo "Skipping backup (first deployment or database not ready)"

          # Keep only last 7 backups
          ls -t backup_production_*.sql | tail -n +8 | xargs -r rm

          # Backup .env.production BEFORE git pull (in case git overwrites it)
          if [ -f .env.production ]; then
            cp .env.production .env.production.backup
            echo "Backed up existing .env.production"
          fi

          # Pull latest code
          git pull origin main
          CURRENT_COMMIT=$(git rev-parse HEAD)
          echo "New commit: $CURRENT_COMMIT"

          # Restore .env.production from backup or copy from home
          if [ -n "${{ secrets.PRODUCTION_ENV }}" ]; then
            if echo "${{ secrets.PRODUCTION_ENV }}" | base64 -d > .env.production.tmp 2>/dev/null && [ -s .env.production.tmp ]; then
              mv .env.production.tmp .env.production
              echo "Environment variables updated from GitHub secrets"
            else
              rm -f .env.production.tmp
              echo "ERROR: Failed to decode PRODUCTION_ENV secret"
              echo "Falling back to existing .env.production file..."
              if [ -f .env.production.backup ]; then
                cp .env.production.backup .env.production
                echo "Restored .env.production from backup"
              elif [ -f ~/.env.production ]; then
                cp ~/.env.production .env.production
                echo "Copied .env.production from home directory"
              else
                echo "ERROR: No .env.production found"
                exit 1
              fi
            fi
          else
            echo "PRODUCTION_ENV secret not set - using existing .env.production file"
            if [ -f .env.production.backup ]; then
              cp .env.production.backup .env.production
              echo "Restored .env.production from backup"
            elif [ -f ~/.env.production ]; then
              cp ~/.env.production .env.production
              echo "Copied .env.production from home directory"
            else
              echo "ERROR: No .env.production found"
              exit 1
            fi
          fi

          # Load only database environment variables for pg_dump (safely)
          export $(cat .env.production | grep -E "^DATABASE_[A-Z_]+=" | xargs)
          echo "Environment variables loaded"

          # Ensure Docker config directory exists
          mkdir -p ~/.docker

          # Login to GitHub Container Registry
          echo "Authenticating with GitHub Container Registry..."
          if timeout 60 bash -c "echo '$GH_PAT' | docker login ghcr.io -u '$GH_ACTOR' --password-stdin"; then
            echo "Successfully authenticated with GitHub Container Registry"
          else
            LOGIN_EXIT_CODE=$?
            if [ $LOGIN_EXIT_CODE -eq 124 ]; then
              echo "Docker login timed out after 60 seconds"
            else
              echo "Failed to authenticate (exit code: $LOGIN_EXIT_CODE)"
            fi

            # Check if credentials are cached
            REGISTRY_OWNER=$(echo "$GH_ACTOR" | tr '[:upper:]' '[:lower:]')
            if docker pull ghcr.io/${REGISTRY_OWNER}/mecabal-backend:latest >/dev/null 2>&1; then
              echo "Login failed but credentials appear cached - continuing..."
            else
              echo "Cannot proceed without valid credentials"
              exit 1
            fi
          fi

          # Stop existing containers gracefully
          echo "Stopping services gracefully..."
          docker-compose -f docker-compose.production.yml down --timeout 30

          # Pull pre-built images from GitHub Container Registry
          echo "Pulling latest Docker images..."
          if timeout 600 docker-compose -f docker-compose.production.yml pull; then
            echo "Successfully pulled all Docker images"
          else
            PULL_EXIT_CODE=$?
            if [ $PULL_EXIT_CODE -eq 124 ]; then
              echo "Docker pull timed out after 10 minutes"
            else
              echo "Docker pull failed (exit code: $PULL_EXIT_CODE)"
            fi
            echo "Continuing with deployment using cached images..."
          fi

          # Start infrastructure services first
          echo "Starting infrastructure services..."
          docker-compose -f docker-compose.production.yml up -d redis minio

          # Start all services
          echo "Starting all services..."
          docker-compose -f docker-compose.production.yml up -d --remove-orphans

          # Wait for services to start
          echo "Waiting for backend to start..."
          sleep 30

          # Run database migrations
          echo "Running database migrations..."
          docker exec mecabal-backend npm run migration:run 2>/dev/null || echo "Migration skipped or already run"

          # Check container status
          echo "Checking container status..."
          docker-compose -f docker-compose.production.yml ps

          # Show logs for any unhealthy containers
          echo "Checking for unhealthy containers..."
          UNHEALTHY=$(docker ps --filter health=unhealthy --format "{{.Names}}")
          if [ ! -z "$UNHEALTHY" ]; then
            echo "WARNING: Unhealthy containers detected: $UNHEALTHY"
            for container in $UNHEALTHY; do
              echo "=== Logs for $container ==="
              docker logs --tail 50 $container
            done
          fi

          # Additional wait for health checks
          echo "Waiting for health checks..."
          sleep 15

          # Health check with retries
          echo "Running health checks..."
          for ATTEMPT in {1..3}; do
            echo "Health check attempt $ATTEMPT/3..."
            if curl -f -s http://localhost:3000/health > /dev/null 2>&1; then
              echo "Backend is healthy!"
              break
            else
              if [ $ATTEMPT -lt 3 ]; then
                echo "Not ready yet, waiting 20 seconds..."
                sleep 20
              else
                echo "WARNING: Backend health check failed after 3 attempts"
                echo "Checking container logs..."
                docker-compose -f docker-compose.production.yml logs --tail=100
                echo "Deployment completed with warnings. Please check logs manually."
              fi
            fi
          done

          # Clean up old images and containers to save space
          echo "Cleaning up Docker resources..."
          docker container prune -f
          docker image prune -a -f
          docker volume prune -f

          # Show final resource usage
          echo "Docker resource usage after cleanup:"
          docker system df

          echo "Production deployment completed successfully!"
          echo "Deployed commit: $CURRENT_COMMIT"
          echo "Backup available at: $BACKUP_FILE"

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
    - name: Notify Slack
      if: env.SLACK_WEBHOOK_URL
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        text: |
          MeCabal Backend Deployment ${{ job.status }}
          Branch: ${{ github.ref }}
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
